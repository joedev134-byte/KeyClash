<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="KeyClash">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07070f"/>
      <stop offset="50%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#12081a"/>
    </linearGradient>
    <linearGradient id="clash" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5d4"/>
      <stop offset="50%" stop-color="#f72585"/>
      <stop offset="100%" stop-color="#ffd60a"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00cfc0"/>
      <stop offset="100%" stop-color="#7b2cbf"/>
    </linearGradient>
    <radialGradient id="glowA" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#00f5d4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00f5d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="85%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#f72585" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f72585" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>
  <!-- grid -->
  <g stroke="rgba(0,245,212,0.06)" stroke-width="1">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200 M0 450 H1200 M0 540 H1200"/>
    <path d="M120 0 V630 M240 0 V630 M360 0 V630 M480 0 V630 M600 0 V630 M720 0 V630 M840 0 V630 M960 0 V630 M1080 0 V630"/>
  </g>
  <!-- badge -->
  <rect x="420" y="118" width="360" height="40" rx="20" fill="rgba(0,245,212,0.1)" stroke="rgba(0,245,212,0.4)" stroke-width="1.5"/>
  <text x="600" y="145" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#00f5d4">MULTIPLAYER TYPING RACE</text>
  <!-- logo -->
  <text x="600" y="280" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="96" font-weight="900" letter-spacing="6" fill="#e8ecff">KEY</text>
  <text x="600" y="380" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="96" font-weight="900" letter-spacing="6" fill="url(#clash)">CLASH</text>
  <!-- tagline -->
  <text x="600" y="450" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" fill="#8b93b8">Type fast. Type clean. Take the crown.</text>
  <!-- pills -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#e8ecff">
    <rect x="250" y="500" width="140" height="42" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="320" y="527" text-anchor="middle">1v1 Online</text>
    <rect x="410" y="500" width="160" height="42" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="490" y="527" text-anchor="middle">8 Languages</text>
    <rect x="590" y="500" width="160" height="42" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="670" y="527" text-anchor="middle">Daily Challenge</text>
    <rect x="770" y="500" width="180" height="42" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="860" y="527" text-anchor="middle">Up to 10 Players</text>
  </g>
</svg>
